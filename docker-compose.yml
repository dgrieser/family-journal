version: '3.9'
services:
  mysql:
    image: mysql:8.3
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-familyjournal}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    environment:
      MYSQL_DSN: ${MYSQL_DSN}
      SESSION_SECRET: ${SESSION_SECRET:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: "10"
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}

volumes:
  mysql_data:
  uploads:
