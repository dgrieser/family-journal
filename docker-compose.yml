version: '3.9'
services:
  mysql:
    image: mysql:8.3
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: familyjournal
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    environment:
      MYSQL_DSN: root:password@tcp(mysql:3306)/familyjournal?parseTime=true
      SESSION_SECRET: dev-secret
      COOKIE_SECURE: "false"
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: "10"
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080

volumes:
  mysql_data:
  uploads:
