services:
  familyjournal-mysql:
    image: mysql:8.3
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-familyjournal}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  familyjournal-backend:
    build: ./backend
    environment:
      MYSQL_DSN: ${MYSQL_DSN:-root:change-me@tcp(familyjournal-mysql:3306)/familyjournal?parseTime=true}
      SESSION_SECRET: ${SESSION_SECRET:-replace-with-long-random-secret}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: "25"
    depends_on:
      familyjournal-mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  familyjournal-frontend:
    build: ./frontend
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-familyjournal-backend}
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-25}
    depends_on:
      familyjournal-backend:
        condition: service_healthy
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  mysql_data:
  uploads:
